name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: >-
          Version bump override. Leave as "auto" to detect from commits
          (BREAKING → major, feat → minor, fix/refactor/perf → patch).
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Detect version bump
        id: version
        run: |
          if [ "$BUMP" = "auto" ]; then
            if git describe --tags --abbrev=0 >/dev/null 2>&1; then
              VERSION=$(git cliff --bumped-version)
              echo "detected: $VERSION"
              if [ "$VERSION" = "$(jq -r .version package.json)" ]; then
                echo "No new commits since last tag — nothing to release."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              npm version "$VERSION" --no-git-tag-version
            else
              echo "No tags yet. Deriving bump from conventional commits…"
              if git log --format="%s" HEAD | grep -qiE "BREAKING CHANGE|^.*!:"; then
                npm version major --no-git-tag-version
              elif git log --format="%s" HEAD | grep -q "^feat"; then
                npm version minor --no-git-tag-version
              else
                npm version patch --no-git-tag-version
              fi
            fi
          else
            npm version "$BUMP" --no-git-tag-version
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
        env:
          BUMP: ${{ inputs.bump || 'auto' }}

      - name: Update metadata.json
        if: steps.version.outputs.skip != 'true'
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' src/metadata.json > /tmp/metadata.json && \
            mv /tmp/metadata.json src/metadata.json

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          git cliff --tag "v${{ steps.version.outputs.version }}" \
            -o CHANGELOG.md
          git cliff --tag "v${{ steps.version.outputs.version }}" \
            --unreleased -o /tmp/release-notes.md

      - name: Build extension
        if: steps.version.outputs.skip != 'true'
        run: ./scripts/build.sh

      - uses: stefanzweifel/git-auto-commit-action@v5
        if: steps.version.outputs.skip != 'true'
        with:
          commit_message: "chore: release v${{ steps.version.outputs.version }}"
          tagging_message: "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          body_path: /tmp/release-notes.md
          files: dist/*.zip
